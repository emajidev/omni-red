  <title>SomosUnoVzla · Respuesta a Crisis</title>
  <script>
    // Aplica el tema guardado ANTES de pintar para evitar el parpadeo (FOUC).
    (function () {
      try {
        var t = localStorage.getItem('somosuno-theme');
        if (!t) t = 'light'; // Inicia siempre en light si no hay preferencia
        document.documentElement.classList.add(t);
      } catch (e) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <script>
    function showBanner(text) {
      // Remove any existing banner
      var existing = document.querySelector('.error-banner');
      if (existing) existing.remove();
      
      var div = document.createElement('div');
      div.className = 'error-banner';
      div.style.position = 'fixed';
      div.style.top = '10px';
      div.style.left = '10px';
      div.style.right = '10px';
      div.style.background = '#e53e3e';
      div.style.color = 'white';
      div.style.padding = '15px';
      div.style.zIndex = '99999';
      div.style.fontFamily = 'monospace';
      div.style.fontSize = '12px';
      div.style.borderRadius = '8px';
      div.style.wordBreak = 'break-all';
      div.innerText = text;
      document.documentElement.appendChild(div);
    }

    window.addEventListener('error', function(e) {
      showBanner('Runtime Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
    });
    
    window.addEventListener('unhandledrejection', function(e) {
      showBanner('Unhandled Rejection: ' + e.reason);
    });

    var origConsoleError = console.error;
    console.error = function() {
      origConsoleError.apply(console, arguments);
      var msg = Array.prototype.slice.call(arguments).map(function(arg) {
        if (arg instanceof Error) return arg.message + '\n' + arg.stack;
        if (typeof arg === 'object') {
          try { return JSON.stringify(arg); } catch(e) { return String(arg); }
        }
        return String(arg);
      }).join(' ');
      showBanner('Console Error: ' + msg);
    };
  </script>

  <style>
    .loader { position: fixed; inset: 0; z-index: 9999; background: #f5f2ed; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .loader-bg { position: absolute; inset: 0; z-index: 0; }
    .loader-bg-img { width: 100%; height: 100%; object-fit: cover; }
    .loader-bg-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(26,26,26,0.1) 0%, rgba(26,26,26,0.85) 100%); }
    .loader-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .loader-brand-img { width: 220px; filter: brightness(0) invert(1); }
    .loader-text { color: rgba(255,255,255,0.7); font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .loader-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .loader-bar-fill { width: 100%; height: 100%; background: #d6fd70; border-radius: 4px; animation: pulse-bar 1.5s infinite ease-in-out; transform-origin: left; }
    @keyframes pulse-bar { 0% { transform: scaleX(0); opacity: 1; } 100% { transform: scaleX(1); opacity: 0; } }
  </style>
