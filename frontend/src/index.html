<!doctype html>
<html lang="es" class="dark">
<head>
  <meta charset="utf-8" />
  <title>OmniRed · Respuesta a Crisis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="description" content="OmniRed: centralización de reportes de personas, acopio y sismos tras el sismo en Venezuela." />

  <!--
    🔐 Content-Security-Policy (defensa en profundidad).
    `connect-src` restringe a dónde puede hablar el navegador: Supabase y los tiles del mapa.
    NOTA: en producción sírvela como CABECERA HTTP y elimina 'unsafe-eval'
    (necesario solo por el CDN de Tailwind en desarrollo) compilando Tailwind con PostCSS.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com;
    style-src 'self' 'unsafe-inline' https://unpkg.com;
    img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org;
    font-src 'self' data:;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org ws: http://localhost:* http://0.0.0.0:*;
    worker-src 'self' blob:;
  " />

  <!-- Leaflet (mapa interactivo real) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Tailwind CSS (CDN de desarrollo). En producción: compilar con PostCSS. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Lienzo / superficies (alto contraste, modo oscuro)
            ink:    { 900: '#0b0f14', 800: '#121821', 700: '#1b2430', 600: '#27313f' },
            // Semántica de alerta
            alert:  '#ef4444', // 🔴 desaparecido / urgente
            warn:   '#f97316', // 🟠 acentos / atención
            safe:   '#22c55e', // 🟢 a salvo
            info:   '#3b82f6'  // 🔵 acopio / servicios
          },
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif']
          },
          keyframes: {
            'count-pop': { '0%': { transform: 'scale(.8)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            'sheet-up':  { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } }
          },
          animation: {
            'count-pop': 'count-pop .4s ease-out both',
            'sheet-up':  'sheet-up .28s cubic-bezier(.16,1,.3,1) both'
          }
        }
      }
    };
  </script>
</head>
<body class="bg-ink-900 text-slate-100 antialiased overflow-hidden">
  <app-root>
    <!-- Splash mientras Angular arranca -->
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0f14;color:#ef4444;font-family:system-ui;">
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:800;letter-spacing:.05em">🔴 OmniRed</div>
        <div style="color:#64748b;margin-top:.5rem">Cargando plataforma…</div>
      </div>
    </div>
  </app-root>
</body>
</html>
